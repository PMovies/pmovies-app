<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PMovies Weekly</title>

  <!-- SEO -->
  <meta name="description" content="Your weekly film digest from the PMovies community — top 100 movers, fan art, creator picks and what's in cinemas."/>
  <link rel="canonical" href="https://p-movies.com/weekly"/>

  <!-- Open Graph — og:image is the Canva cover uploaded each Friday as weekly-cover.jpg -->
  <meta property="og:type"        content="website"/>
  <meta property="og:url"         content="https://p-movies.com/weekly"/>
  <meta property="og:site_name"   content="PMovies"/>
  <meta property="og:title"       content="PMovies Weekly — Film Community Digest"/>
  <meta property="og:description" content="Top 100 movers, fan art of the week, now in cinemas and backed creator picks — every Friday from the PMovies community."/>
  <meta property="og:image"       content="https://p-movies.com/weekly-cover.jpg"/>
  <meta property="og:image:width" content="1200"/>
  <meta property="og:image:height"content="894"/>

  <!-- Twitter / X Card -->
  <meta name="twitter:card"        content="summary_large_image"/>
  <meta name="twitter:site"        content="@PMovies155"/>
  <meta name="twitter:title"       content="PMovies Weekly — Film Community Digest"/>
  <meta name="twitter:description" content="Top 100 movers, fan art of the week, now in cinemas and backed creator picks — every Friday."/>
  <meta name="twitter:image"       content="https://p-movies.com/weekly-cover.jpg"/>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080808;
      --card:    #111111;
      --card2:   #161616;
      --border:  #1e1e1e;
      --orange:  #f5a623;
      --text:    #e8e8e8;
      --muted:   #777777;
      --muted2:  #555555;
      --green:   #4caf50;
      --red:     #e05252;
      --radius:  8px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--orange); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ── */
    .wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── Orange stripe ── */
    .top-stripe {
      height: 5px;
      background: repeating-linear-gradient(
        90deg, var(--orange) 0, var(--orange) 18px, transparent 18px, transparent 26px
      );
    }

    /* ── Section labels ── */
    .section-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 18px;
    }
    .section-label::before { content: '◆'; font-size: 7px; opacity: .8; }

    .section {
      padding: 32px 0;
      border-bottom: 1px solid var(--border);
    }

    /* ── Header ── */
    .pmw-header {
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border);
    }
    .pmw-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 10px;
    }
    .pmw-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 8vw, 64px);
      letter-spacing: .06em;
      line-height: 1;
      color: #fff;
    }
    .pmw-title span { color: var(--orange); }
    .pmw-meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px 20px;
      font-size: 13px;
      color: var(--muted);
    }
    .pmw-meta-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--muted2);
      flex-shrink: 0;
    }
    .pmw-teaser { color: var(--text); }

    /* ── Movers ── */
    .sec-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .sec-header .section-label { margin-bottom: 0; }

    .vote-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #000;
      background: var(--orange);
      border: none;
      border-radius: 4px;
      padding: 7px 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity .2s;
    }
    .vote-btn:hover { opacity: .85; text-decoration: none; }

    .movers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .movers-col-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .mover-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      transition: border-color .2s;
    }
    .mover-row:hover { border-color: #333; }
    .mover-badge {
      font-size: 12px;
      font-weight: 700;
      min-width: 38px;
      text-align: center;
      padding: 3px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .badge-up { background: #162216; color: var(--green); }
    .badge-dn { background: #221616; color: var(--red); }
    .mover-rank { font-size: 11px; color: var(--muted2); min-width: 28px; flex-shrink: 0; }
    .mover-title { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mover-year { font-size: 11px; color: var(--muted2); flex-shrink: 0; }

    /* ── Stats + Quotes ── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
    }
    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      color: var(--orange);
      line-height: 1;
      letter-spacing: .02em;
    }
    .stat-desc { font-size: 12px; color: var(--muted); margin-top: 4px; letter-spacing: .5px; }

    .quote-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--orange);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 14px 18px;
      margin-bottom: 10px;
    }
    .quote-text {
      font-size: 14px;
      font-style: italic;
      color: #ccc;
      line-height: 1.65;
    }
    .quote-credit { margin-top: 8px; font-size: 12px; color: var(--muted); }
    .quote-credit strong { color: var(--orange); font-weight: 600; }

    /* ── Cinemas ── */
    .cinema-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .cinema-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s;
    }
    .cinema-card:hover { border-color: #333; }
    .cinema-poster {
      height: 130px;
      background: #1a1a2e;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }
    .cinema-poster img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: .7;
    }
    .cinema-poster-overlay {
      position: relative;
      z-index: 1;
      padding: 8px;
      width: 100%;
    }
    .now-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      background: var(--orange);
      color: #000;
      padding: 2px 7px;
      border-radius: 3px;
      display: inline-block;
    }
    .cinema-info { padding: 10px 12px; }
    .cinema-title { font-size: 13px; font-weight: 700; line-height: 1.3; }
    .cinema-genre { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* ── Fan Art ── */
    .fanart-frame {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .fanart-poster {
      width: 170px;
      flex-shrink: 0;
      background: #1a1a2e;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      overflow: hidden;
    }
    .fanart-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .fanart-poster-placeholder {
      color: var(--muted2);
      font-size: 11px;
      text-align: center;
      padding: 20px;
      line-height: 1.5;
    }
    .fanart-info {
      flex: 1;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }
    .fanart-eyebrow {
      font-size: 10px;
      color: var(--orange);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 700;
    }
    .fanart-film {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: .04em;
      color: #fff;
      line-height: 1.1;
    }
    .fanart-year { font-size: 14px; color: var(--muted); font-family: 'Montserrat', sans-serif; font-weight: 400; }
    .fanart-credit { font-size: 13px; color: var(--muted); }
    .fanart-credit strong { color: #ccc; }
    .fanart-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .fanart-link { font-size: 13px; font-weight: 700; color: var(--orange); }
    .fanart-link:hover { text-decoration: underline; }

    /* ── YouTube ── */
    .yt-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .yt-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: block;
      transition: border-color .2s;
    }
    .yt-card:hover { border-color: #c00; text-decoration: none; }
    .yt-thumb {
      position: relative;
      padding-top: 56.25%; /* 16:9 */
      background: #1a1a1a;
      overflow: hidden;
    }
    .yt-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .yt-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.3);
      opacity: 0;
      transition: opacity .2s;
    }
    .yt-card:hover .yt-play { opacity: 1; }
    .yt-play svg { width: 40px; height: 40px; fill: #fff; filter: drop-shadow(0 2px 6px rgba(0,0,0,.6)); }
    .yt-info { padding: 10px 12px; }
    .yt-title {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .yt-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .yt-channel-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
      font-size: 12px;
      font-weight: 700;
      color: #c00;
    }
    .yt-channel-link svg { width: 14px; height: 14px; fill: currentColor; }
    .yt-channel-link:hover { text-decoration: underline; }
    @media (max-width: 600px) { .yt-grid { grid-template-columns: 1fr; } }

    /* ── Creators ── */
    .creators-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .creator-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color .2s;
    }
    .creator-card:hover { border-color: #333; }
    .creator-top { display: flex; align-items: center; gap: 10px; }
    .creator-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #1e1e2e;
      border: 2px solid var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14px;
      color: var(--orange);
      flex-shrink: 0;
      font-family: 'Montserrat', sans-serif;
    }
    .creator-platform {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--orange);
      background: #1e1e14;
      border: 1px solid #2a2200;
      padding: 2px 8px;
      border-radius: 3px;
      display: inline-block;
      margin-bottom: 4px;
    }
    .creator-platform.platform-tiktok  { color: #aaa; background: #1a1a1a; border-color: #333; }
    .creator-platform.platform-blog    { color: #aaa; background: #1a1a1a; border-color: #333; }
    .creator-platform.platform-other   { color: #aaa; background: #1a1a1a; border-color: #333; }
    .creator-name { font-size: 13px; font-weight: 700; color: #fff; line-height: 1.3; }
    .creator-bio { font-size: 12px; color: var(--muted); line-height: 1.55; flex: 1; }
    .creator-link {
      font-size: 12px;
      font-weight: 700;
      color: var(--orange);
      border: 1px solid #2a2200;
      border-radius: 4px;
      padding: 6px 10px;
      text-align: center;
      display: block;
      background: #1a1400;
      transition: background .2s;
      text-decoration: none;
    }
    .creator-link:hover { background: #2a2000; text-decoration: none; }
    .creator-link.platform-tiktok,
    .creator-link.platform-blog,
    .creator-link.platform-other {
      color: #aaa;
      border-color: #333;
      background: #141414;
    }
    .creator-link.platform-tiktok:hover,
    .creator-link.platform-blog:hover,
    .creator-link.platform-other:hover { background: #1e1e1e; }

    /* ── Mini Series Top 50 ── */
    .mini-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .mini-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color .2s;
    }
    .mini-row:hover { border-color: #333; }
    .mini-rank {
      font-size: 11px;
      font-weight: 700;
      color: var(--orange);
      min-width: 22px;
      flex-shrink: 0;
      text-align: right;
    }
    .mini-title {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mini-year {
      font-size: 10px;
      color: var(--muted2);
      flex-shrink: 0;
    }
    .mini-votes {
      font-size: 10px;
      color: var(--muted2);
      flex-shrink: 0;
    }
    @media (max-width: 600px) { .mini-list { grid-template-columns: 1fr; } }

    /* ── Theater Race ── */
    .tr-list { display: flex; flex-direction: column; gap: 8px; }
    .tr-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color .2s;
    }
    .tr-row:hover { border-color: rgba(255,184,0,.3); }
    .tr-row.tr-first  { border-color: rgba(255,184,0,.35); background: #111008; }
    .tr-row.tr-second { border-color: rgba(200,200,200,.2); }
    .tr-row.tr-third  { border-color: rgba(180,120,60,.25); }
    .tr-medal {
      font-size: 22px;
      min-width: 32px;
      text-align: center;
      flex-shrink: 0;
    }
    .tr-rank-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted2);
      min-width: 32px;
      text-align: center;
      flex-shrink: 0;
    }
    .tr-name {
      flex: 1;
      min-width: 0;
    }
    .tr-display { font-size: 14px; font-weight: 700; color: #fff; }
    .tr-handle  { font-size: 11px; color: var(--muted2); margin-top: 1px; }
    .tr-count {
      text-align: right;
      flex-shrink: 0;
    }
    .tr-count-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--orange);
      line-height: 1;
      letter-spacing: .02em;
    }
    .tr-count-label { font-size: 10px; color: var(--muted2); letter-spacing: .5px; }

    /* ── Share ── */
    .share-section {
      padding: 32px 0;
      border-bottom: 1px solid var(--border);
    }
    .share-buttons { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .5px;
      border: none;
      border-radius: 6px;
      padding: 11px 22px;
      cursor: pointer;
      transition: opacity .2s;
      text-decoration: none;
    }
    .share-btn:hover { opacity: .85; text-decoration: none; }
    .share-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .share-copy { background: var(--orange); color: #000; }
    .share-x    { background: #000; color: #fff; border: 1px solid #333; }

    .og-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 10px; }
    .og-preview {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      max-width: 400px;
    }
    .og-cover {
      aspect-ratio: 4419 / 3291;
      background: #1a1228;
      position: relative;
      overflow: hidden;
    }
    .og-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .og-cover-fallback {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: .1em;
      color: #fff;
    }
    .og-cover-fallback span { color: var(--orange); }
    .og-body { padding: 12px 14px; background: var(--card); }
    .og-body-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .og-body-desc { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 5px; }
    .og-body-url { font-size: 10px; color: var(--muted2); letter-spacing: .5px; }

    /* ── Archive ── */
    .archive-section {
      padding: 36px 0 8px;
      border-bottom: 1px solid var(--border);
    }
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .archive-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: border-color .2s;
      text-decoration: none;
      display: block;
      color: var(--text);
    }
    .archive-card:hover { border-color: var(--orange); text-decoration: none; }
    .archive-card.active { border-color: var(--orange); }
    .archive-issue { font-size: 10px; color: var(--orange); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }
    .archive-date { font-size: 12px; color: #ccc; font-weight: 600; margin-bottom: 3px; }
    .archive-teaser { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* ── Footer ── */
    .pmw-footer {
      padding: 28px 0 0;
      text-align: center;
    }
    .footer-back {
      font-size: 13px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: .5px;
    }
    .social-links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .social-link {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid #222;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s, border-color .2s;
    }
    .social-link:hover { color: var(--orange); border-color: var(--orange); text-decoration: none; }
    .social-link svg { width: 18px; height: 18px; }

    /* ── Loading skeleton ── */
    #loading {
      padding: 80px 0;
      text-align: center;
      color: var(--muted);
    }
    .sk-pulse {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: pulse 1.4s ease-in-out infinite;
    }

function copyLink(url){
  navigator.clipboard.writeText(url).then(()=>{
    const btn = document.querySelector('.share-copy');
    if(btn){
      const orig = btn.innerHTML;
      btn.textContent = '✓ Link copied!';
      setTimeout(()=>{ btn.innerHTML = orig; }, 2500);
    }
  }).catch(()=>{
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

    const active = k === currentKey ? 'active' : '';
    return `
      <a href="?issue=${encodeURIComponent(k)}" class="archive-card ${active}">
        <div class="archive-issue">Issue #${esc(d.issue||'?')}</div>
        <div class="archive-date">${esc(d.publishDate||k)}</div>
        <div class="archive-teaser">${esc(d.teaser||'')}</div>
      </a>`;
  }).join('');
  return `
    <div class="archive-section">
      <div class="section-label">Previous issues</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:16px">Every issue archived — browse the community's history week by week.</p>
      <div class="archive-grid">${cards}</div>
    </div>`;
}

/* ─── Footer ── */
function renderFooter(){
  const socials = [
    { p:'x',          url:'https://twitter.com/PMovies155',   label:'X / Twitter' },
    { p:'youtube',    url:'https://youtube.com/@PMovies155',   label:'YouTube'     },
    { p:'instagram',  url:'https://instagram.com/pmovies155',  label:'Instagram'   },
    { p:'tiktok',     url:'https://tiktok.com/@pmovies155',     label:'TikTok'      },
    { p:'letterboxd', url:'https://letterboxd.com/pastoo',     label:'Letterboxd'  },
  ];
  const links = socials.map(s=>`
    <a href="${s.url}" class="social-link" target="_blank" rel="noopener" title="${s.label}" aria-label="${s.label}">
      ${socialIcon(s.p)}
    </a>`).join('');
  return `
    <div class="pmw-footer">
      <a href="${SITE_URL}" class="footer-back">← Back to p-movies.com</a>
      <div class="social-links">${links}</div>
    </div>`;
}

/* ─── Coming Soon ─── */
function showComingSoon(){
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('content');
  el.style.display = 'block';
  el.innerHTML = `
    <div id="coming-soon">
      <div class="cs-issue">Issue #1 · Coming Friday</div>
      <div class="cs-title"><span>PMovies</span> Weekly</div>
      <div class="cs-sub">Your weekly film community digest — every Friday.</div>
      <div class="cs-date">
        First issue
        <strong>Friday, 15 May 2026</strong>
      </div>
    </div>
    ${renderFooter()}`;
}

/* ─── Render All ─── */
function renderAll(data){
  document.title = `PMovies Weekly #${data.issue} — ${data.teaser||'Film Community Digest'}`;
  const html =
    renderHeader(data) +
    renderMovers(data.movers) +
    renderMiniSeries(data.miniSeries) +
    renderStats(data.stats, data.quotes) +
    renderCinemas(data.cinemas) +
    renderTheaterRace(data.theaterRace) +
    renderYouTube(data.youtube) +
    renderFanArt(data.fanArt) +
    renderCreators(data.creators) +
    renderShare(data) +
    `<div id="archive-placeholder"></div>` +
    renderFooter();
  document.getElementById('content').innerHTML = html;
}

/* ─── Init ─── */
async function init(){
  const params    = new URLSearchParams(location.search);
  const issueKey  = params.get('issue');

  try {
    const issueUrl  = issueKey
      ? `${RTDB}/newsletter/archive/${issueKey}.json`
      : `${RTDB}/newsletter/current.json`;

    const [issueRes, archiveRes] = await Promise.all([
      fetch(issueUrl),
      fetch(`${RTDB}/newsletter/archive.json?shallow=true`)
    ]);

    const issue   = issueRes.ok   ? await issueRes.json()   : null;
    const archive = archiveRes.ok ? await archiveRes.json() : null;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    if(issue){
      renderAll(issue);
      const ph = document.getElementById('archive-placeholder');
      if(ph && archive) ph.outerHTML = renderArchive(archive, issueKey);
    } else {
      showComingSoon();
    }
  } catch(e){
    showComingSoon();
  }
}

init();
</script>
</body>
</html>
